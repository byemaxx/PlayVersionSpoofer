name: Build Android

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch / tag / commit SHA to build"
        required: false
        default: "main"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PLAYSPOOFER_KEYSTORE_BASE64: ${{ secrets.PLAYSPOOFER_KEYSTORE_BASE64 }}
      PLAYSPOOFER_KEY_ALIAS: ${{ secrets.PLAYSPOOFER_KEY_ALIAS }}
      PLAYSPOOFER_STORE_PASSWORD: ${{ secrets.PLAYSPOOFER_STORE_PASSWORD }}
      PLAYSPOOFER_KEY_PASSWORD: ${{ secrets.PLAYSPOOFER_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine signing availability
        id: signing
        shell: bash
        run: |
          present=0
          for name in PLAYSPOOFER_KEYSTORE_BASE64 PLAYSPOOFER_KEY_ALIAS PLAYSPOOFER_STORE_PASSWORD PLAYSPOOFER_KEY_PASSWORD; do
            if [ -n "${!name}" ]; then
              present=$((present + 1))
            fi
          done

          if [ "$present" -ne 0 ] && [ "$present" -ne 4 ]; then
            echo "Release signing secrets must either all be configured or all be absent."
            exit 1
          fi

          if [ "$present" -eq 4 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode release keystore
        if: ${{ steps.signing.outputs.enabled == 'true' }}
        run: |
          printf '%s' "$PLAYSPOOFER_KEYSTORE_BASE64" | base64 --decode > app/key.jks

      - name: Validate managed signing material
        if: ${{ steps.signing.outputs.enabled == 'true' }}
        run: |
          keytool -list \
            -keystore app/key.jks \
            -storepass "$PLAYSPOOFER_STORE_PASSWORD" \
            -alias "$PLAYSPOOFER_KEY_ALIAS" > /dev/null

          TMP_DIR=$(mktemp -d)
          printf 'signing-check' > "$TMP_DIR/check.txt"
          jar --create --file "$TMP_DIR/signing-check.jar" -C "$TMP_DIR" check.txt > /dev/null
          jarsigner \
            -keystore app/key.jks \
            -storepass "$PLAYSPOOFER_STORE_PASSWORD" \
            -keypass "$PLAYSPOOFER_KEY_PASSWORD" \
            "$TMP_DIR/signing-check.jar" \
            "$PLAYSPOOFER_KEY_ALIAS" > /dev/null

      - name: Build Debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Build signed Release APK
        if: ${{ steps.signing.outputs.enabled == 'true' }}
        run: ./gradlew assembleRelease

      - name: Rename Debug APK
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/PlayVersionSpoofer-${SHA_SHORT}-debug.apk"

      - name: Rename signed Release APK
        if: ${{ steps.signing.outputs.enabled == 'true' }}
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          mv app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/PlayVersionSpoofer-${SHA_SHORT}-release.apk"

      - name: Upload Release APK
        if: ${{ steps.signing.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: PlayVersionSpoofer-release
          path: app/build/outputs/apk/release/PlayVersionSpoofer-*-release.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PlayVersionSpoofer-debug
          path: app/build/outputs/apk/debug/PlayVersionSpoofer-*-debug.apk
