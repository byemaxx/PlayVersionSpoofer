name: Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release (e.g. v1.0.0)'
        required: false
      body:
        description: 'Release notes'
        required: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PLAYSPOOFER_KEYSTORE_BASE64: ${{ secrets.PLAYSPOOFER_KEYSTORE_BASE64 }}
      PLAYSPOOFER_KEY_ALIAS: ${{ secrets.PLAYSPOOFER_KEY_ALIAS }}
      PLAYSPOOFER_STORE_PASSWORD: ${{ secrets.PLAYSPOOFER_STORE_PASSWORD }}
      PLAYSPOOFER_KEY_PASSWORD: ${{ secrets.PLAYSPOOFER_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate release signing secrets
        run: |
          for name in PLAYSPOOFER_KEYSTORE_BASE64 PLAYSPOOFER_KEY_ALIAS PLAYSPOOFER_STORE_PASSWORD PLAYSPOOFER_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              exit 1
            fi
          done

      - name: Decode release keystore
        run: |
          printf '%s' "$PLAYSPOOFER_KEYSTORE_BASE64" | base64 --decode > app/key.jks

      - name: Build APKs
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug assembleRelease

      - name: Rename APKs
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag_name }}" ]]; then
            VERSION="${{ inputs.tag_name }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION=$(git rev-parse --short HEAD)
          fi
          
          echo "Using VERSION=$VERSION"
          
          RELEASE_APK=app/build/outputs/apk/release/app-release.apk
          if [ ! -f "$RELEASE_APK" ]; then
            RELEASE_APK=app/build/outputs/apk/release/app-release-unsigned.apk
          fi
          mv "$RELEASE_APK" "app/build/outputs/apk/release/PlayVersionSpoofer-${VERSION}-release.apk"
          mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/PlayVersionSpoofer-${VERSION}-debug.apk"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          body: ${{ inputs.body }}
          files: |
            app/build/outputs/apk/release/PlayVersionSpoofer-*-release.apk
            app/build/outputs/apk/debug/PlayVersionSpoofer-*-debug.apk
          generate_release_notes: true
          draft: false
          prerelease: false
